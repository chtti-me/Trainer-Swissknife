# Render Blueprint：培訓師瑞士刀 v4.0
# 部署：把 Next.js 跑在 Render Web Service，資料庫由 Supabase 提供
# 文件：https://render.com/docs/blueprint-spec

services:
  - type: web
    name: trainer-swissknife
    runtime: node
    plan: free # 免費版：閒置 15 分鐘休眠、冷啟動 30 秒；升 starter $7/月可避免 spin-down，升 standard $25/月才能加 Persistent Disk
    region: singapore # 對齊 Supabase ap-southeast-1
    branch: main
    buildCommand: |
      npm ci && \
      npx prisma generate && \
      npm run build
    startCommand: npx next start -H 0.0.0.0 -p $PORT
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # ⚠ Render 在 NODE_ENV=production 時會讓 npm ci 自動加 --omit=dev，
      # 跳過 devDependencies（autoprefixer、postcss、tailwindcss、typescript、prisma），
      # 導致 next build 失敗。設這個變數強制安裝 devDependencies。
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      - key: NEXTAUTH_URL
        sync: false # 部署後手動填入：https://<service>.onrender.com
      - key: NEXTAUTH_SECRET
        generateValue: true # Render 自動生成隨機字串
      - key: AUTH_TRUST_HOST
        value: "true"

      # ============ Supabase ============
      # ⚠ 請從 Supabase Dashboard → Settings → Database → Connection string 區塊
      #   複製 Connection pooling 整段 URI（user 必須是 postgres.<project_ref>，
      #   主機可能是 aws-0/aws-1/aws-2-<region>.pooler.supabase.com，請以 Dashboard 為準）。
      #   密碼若含 @、#、!、/、: 等特殊字元，務必先 URL encode 再貼進來。
      - key: DATABASE_URL
        sync: false # pooler，6543 port，?pgbouncer=true&connection_limit=1
      - key: DIRECT_URL
        sync: false # 同主機但用 5432 port（session mode），prisma migrate / db push 用
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false

      # ============ AI ============
      - key: AI_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_BASE_URL
        value: https://generativelanguage.googleapis.com/v1beta/openai
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_MODEL_PLANNING
        value: gemini-2.5-flash
      # ⚠ Gemini OpenAI-compatible 端點僅接受 "gemini-embedding-001"（預設 3072 維，
      # 我們透過 dimensions 參數截斷成 768 以符合 pgvector HNSW 上限 2000）。
      - key: GEMINI_EMBEDDING_MODEL
        value: gemini-embedding-001
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: OPENAI_EMBEDDING_MODEL
        value: text-embedding-3-small

      # ---- Groq Cloud（OpenAI-compatible，免費額度高） ----
      # 申請：https://console.groq.com/keys
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_MODEL_PLANNING
        value: llama-3.3-70b-versatile

      # ---- NVIDIA NIM（OpenAI-compatible，新帳號送 1000 credits） ----
      # 申請：https://build.nvidia.com/settings/api-keys
      - key: NVIDIA_API_KEY
        sync: false
      - key: NVIDIA_BASE_URL
        value: https://integrate.api.nvidia.com/v1
      - key: NVIDIA_MODEL
        value: meta/llama-3.3-70b-instruct
      - key: NVIDIA_MODEL_PLANNING
        value: meta/llama-3.3-70b-instruct

      # ---- OpenRouter（聚合服務，:free 後綴模型完全免費） ----
      # 申請：https://openrouter.ai/keys
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: OPENROUTER_MODEL
        value: meta-llama/llama-3.3-70b-instruct:free
      - key: OPENROUTER_MODEL_PLANNING
        value: meta-llama/llama-3.3-70b-instruct:free

      # ---- xAI Grok（按 token 計費；新帳號可申請評估額度） ----
      # 申請：https://console.x.ai/
      - key: XAI_API_KEY
        sync: false
      - key: XAI_BASE_URL
        value: https://api.x.ai/v1
      - key: XAI_MODEL
        value: grok-2-latest
      - key: XAI_MODEL_PLANNING
        value: grok-2-latest

      # ============ 工具 ============
      - key: TAVILY_API_KEY
        sync: false

      # ============ EDM 產生器圖庫 ============
      - key: PEXELS_API_KEY
        sync: false
      - key: UNSPLASH_ACCESS_KEY
        sync: false

      # ============ 相似度 ============
      - key: SIMILARITY_THRESHOLD
        value: "0.75"
      - key: SIMILARITY_LEXICAL_WEIGHT
        value: "0.4"
      - key: SIMILARITY_VECTOR_WEIGHT
        value: "0.6"
      # 與 prisma/schema.prisma 的 vector(N) 保持一致：
      # - Gemini gemini-embedding-001 ➜ 768（預設）
      # - OpenAI text-embedding-3-small ➜ 1536（同時要把 schema 改 vector(1536) 再 db push）
      - key: EMBEDDING_DIMENSION
        value: "768"

      - key: APP_VERSION
        value: v4.0

      # ============ 提醒 ============
      # ⚠ Render 檔案系統為臨時的（ephemeral filesystem），
      # `agent-workspace/` 在每次部署或重啟後會清空。
      # 若要永久保存使用者上傳檔，請改用 Supabase Storage（v5 規劃）。
